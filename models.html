<title>Super Thinking — Mental Models for Kids</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e0e1a;
    --bg-2: #1a1a2e;
    --card: #16162a;
    --card-hover: #1e1e3a;
    --text: #f5f5ff;
    --muted: #9090b8;
    --accent: #ffd166;
    --accent-2: #ef476f;
    --accent-3: #06d6a0;
    --accent-4: #4cc9f0;
    --accent-5: #c77dff;
    --border: #2a2a44;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated gradient blobs in background */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    z-index: -1;
    opacity: 0.35;
    pointer-events: none;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #c77dff, transparent 70%);
    top: -100px; left: -100px;
    animation: drift1 18s ease-in-out infinite;
  }
  body::after {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #4cc9f0, transparent 70%);
    bottom: -150px; right: -150px;
    animation: drift2 22s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(80px, 60px) scale(1.2); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-60px, -40px) scale(1.15); }
  }

  header {
    text-align: center;
    padding: 60px 20px 30px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    background: linear-gradient(120deg, var(--accent), var(--accent-2), var(--accent-5), var(--accent-4), var(--accent));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    animation: gradientShift 8s ease-in-out infinite;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .subtitle {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 640px;
    margin: 0 auto;
  }

  .controls {
    max-width: 1200px;
    margin: 30px auto;
    padding: 0 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    align-items: center;
  }

  .search {
    flex: 1;
    min-width: 240px;
    max-width: 400px;
    padding: 12px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search:focus { border-color: var(--accent-4); }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .filter {
    padding: 8px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter:hover { color: var(--text); border-color: var(--accent-4); }
  .filter.active {
    background: var(--accent-4);
    color: var(--bg);
    border-color: var(--accent-4);
    font-weight: 600;
  }

  .grid {
    max-width: 1200px;
    margin: 30px auto 80px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(.2,.9,.3,1.4), background 0.25s, border-color 0.25s, box-shadow 0.3s;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    animation: cardIn 0.6s cubic-bezier(.2,.9,.3,1) forwards;
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--bar, var(--accent));
    opacity: 0.6;
    transition: height 0.25s, opacity 0.25s;
  }

  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--mx,50%) var(--my,50%), var(--bar, var(--accent)), transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    background: var(--card-hover);
    border-color: var(--bar, var(--accent));
    box-shadow: 0 24px 50px rgba(0, 0, 0, 0.5), 0 0 30px var(--bar, var(--accent))33;
  }
  .card:hover::before { height: 5px; opacity: 1; }
  .card:hover::after { opacity: 0.12; }
  .card:hover .visual { transform: scale(1.05); }
  .card:hover .visual svg { filter: drop-shadow(0 0 10px var(--bar, var(--accent))); }

  .visual {
    height: 120px;
    border-radius: 12px;
    background: var(--bg-2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: transform 0.4s cubic-bezier(.2,.9,.3,1.4);
  }
  .visual::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, var(--bar, var(--accent)) 50%, transparent 70%);
    opacity: 0;
    transform: translateX(-100%);
    transition: transform 0.6s, opacity 0.3s;
  }
  .card:hover .visual::before {
    opacity: 0.15;
    transform: translateX(100%);
  }
  .visual svg { transition: filter 0.3s; }

  .visual svg { max-width: 100%; max-height: 100%; }

  .card-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }

  .card-tag {
    display: inline-block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--bar, var(--accent));
    font-weight: 600;
  }

  .card-line {
    color: var(--muted);
    font-size: 0.95rem;
  }

  /* Modal */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 15, 0.85);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-bg.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    max-width: 720px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 36px;
    position: relative;
    animation: slideUp 0.3s ease;
  }

  .modal-close {
    position: absolute;
    top: 18px;
    right: 18px;
    background: var(--bg-2);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: var(--text);
    font-size: 1.25rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--accent-2); }

  .modal-visual {
    height: 200px;
    background: var(--bg-2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }

  .modal h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  .modal-tag {
    display: inline-block;
    padding: 4px 12px;
    background: var(--bg-2);
    border-radius: 999px;
    font-size: 0.8rem;
    color: var(--bar, var(--accent));
    margin-bottom: 18px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .section {
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
  }
  .section h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--bar, var(--accent));
    margin-bottom: 8px;
    font-weight: 700;
  }
  .section p { color: var(--text); font-size: 1rem; line-height: 1.6; }
  .section .quote { font-style: italic; color: var(--muted); border-left: 3px solid var(--bar, var(--accent)); padding-left: 14px; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 0.9rem;
    border-top: 1px solid var(--border);
  }

  /* Animations for SVG illustrations */
  .float { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .spin { animation: spin 8s linear infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

  .pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  .bounce { animation: bounce 1.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>

<header>
  <h1>Super Thinking</h1>

  {

    kid: "Don't ask 'how do I be happy?' Ask 'what makes me sad?' — then stop doing those things.",

    when: "When you're stuck. When the obvious path isn't working. Flip it.",
    svg: `<svg viewBox="0 0 200 120">

  {

    when: "When you're about to get angry at someone. Pause. Was it just a goof-up?",

  },
  {
    id: 'fence', name: "Chesterton's Fence", cat: 'thinking',
    line: "Don't remove a fence till you know why it's there.",

    line: "If [trigger], then [action].",
    kid: "Goals fail. If-then plans succeed. Linking a specific trigger to a specific action bypasses willpower.",
    story: "Peter Gollwitzer (1999). Goals like 'I want to exercise more' mostly fail. If-then plans like 'If it's 7am, then I'll do 20 push-ups' double follow-through across hundreds of replicated studies.",
    when: "When you keep failing to follow through on a goal. Convert it into 'If [specific trigger], then [specific action].'",
    svg: `<svg viewBox="0 0 200 120">
      <rect x="20" y="40" width="60" height="40" fill="#7c83ff" fill-opacity="0.2" stroke="#7c83ff" stroke-width="2" rx="6"/>
      <text x="38" y="58" font-size="9" fill="#7c83ff" font-weight="700">IF</text>
      <text x="32" y="72" font-size="9" fill="#7c83ff">trigger</text>
      <path d="M85,60 L115,60" stroke="#7c83ff" stroke-width="2"/>
      <polygon points="115,55 122,60 115,65" fill="#7c83ff"/>
      <rect x="125" y="40" width="60" height="40" fill="#06d6a0" fill-opacity="0.2" stroke="#06d6a0" stroke-width="2" rx="6"/>
      <text x="143" y="58" font-size="9" fill="#06d6a0" font-weight="700">THEN</text>
      <text x="139" y="72" font-size="9" fill="#06d6a0">action</text>
    </svg>`
  }
];

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const filtersEl = document.getElementById('filters');
const modalBg = document.getElementById('modal-bg');
const modalContent = document.getElementById('modal-content');
const modalCloseBtn = document.getElementById('modal-close');

let currentFilter = 'all';
let currentQuery = '';

function render() {
  grid.innerHTML = '';
  const q = currentQuery.toLowerCase();
  const filtered = MODELS.filter(m => {
    if (currentFilter !== 'all' && m.cat !== currentFilter) return false;
    if (!q) return true;
    return (m.name + ' ' + m.line + ' ' + m.kid).toLowerCase().includes(q);
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--muted);">No models match. Try another search.</div>';
    return;
  }

  filtered.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--bar', COLORS[m.cat]);
    card.style.animationDelay = `${Math.min(i * 50, 600)}ms`;
    card.innerHTML = `
      <div class="visual">${m.svg}</div>
      <span class="card-tag">${CATEGORY_LABELS[m.cat]}</span>
      <div class="card-title">${m.name}</div>
      <div class="card-line">${m.line}</div>
    `;
    card.addEventListener('click', () => openModal(m));
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', `${((e.clientX - r.left) / r.width) * 100}%`);
      card.style.setProperty('--my', `${((e.clientY - r.top) / r.height) * 100}%`);
    });
    grid.appendChild(card);
  });
}

function openModal(m) {
  modalContent.innerHTML = `
    <div class="modal-visual" style="--bar: ${COLORS[m.cat]}">${m.svg}</div>
    <span class="modal-tag" style="--bar: ${COLORS[m.cat]}">${CATEGORY_LABELS[m.cat]}</span>
    <h2>${m.name}</h2>
    <p style="color: var(--muted); font-size: 1.1rem;">${m.line}</p>

    <div class="section" style="--bar: ${COLORS[m.cat]}">
      <h3>✨ In Plain Words</h3>
      <p>${m.kid}</p>
    </div>

    <div class="section" style="--bar: ${COLORS[m.cat]}">
      <h3>📖 The Story</h3>
      <p class="quote">${m.story}</p>
    </div>

    <div class="section" style="--bar: ${COLORS[m.cat]}">
      <h3>⚡ When to Use It</h3>
      <p>${m.when}</p>
    </div>

    <div class="section" style="--bar: ${COLORS[m.cat]}; border-top: none; padding-top: 0">
      <a href="model.html?id=${m.id}"
         style="display:inline-flex; align-items:center; gap:8px; padding:12px 22px;
                background:${COLORS[m.cat]}; color:#0e0e1a; border-radius:999px;
                font-weight:700; font-size:0.9rem; text-decoration:none;
                transition: opacity .2s, transform .2s;"
         onmouseover="this.style.opacity='.8'; this.style.transform='translateY(-2px)'"
         onmouseout="this.style.opacity='1'; this.style.transform='translateY(0)'">
        Read Full Deep Dive →
      </a>
    </div>
  `;
  modalBg.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalBg.classList.remove('open');
  document.body.style.overflow = '';
}

modalCloseBtn.addEventListener('click', closeModal);
modalBg.addEventListener('click', (e) => { if (e.target === modalBg) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

filtersEl.addEventListener('click', (e) => {
  if (!e.target.classList.contains('filter')) return;
  document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

search.addEventListener('input', (e) => {
  currentQuery = e.target.value;
  render();
});

render();
</script>

</body>
</html>
